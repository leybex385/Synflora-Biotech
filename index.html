    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Orbitron', 'sans-serif'],
                        elegant: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        brand: {
                            dark: '#0A0E1A',
                            darker: '#05070F',
                            primary: '#00D4FF',
                            secondary: '#7B2FFF',
                            accent: '#00FF88',
                            gold: '#FFD700',
                            surface: '#111827',
                            surface2: '#1F2937'
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'float-delayed': 'float 6s ease-in-out 3s infinite',
                        'spin-slow': 'spin 12s linear infinite',
                        'glow': 'glow 2s ease-in-out infinite alternate',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                        glow: {
                            '0%': { boxShadow: '0 0 20px rgba(0, 212, 255, 0.3)' },
                            '100%': { boxShadow: '0 0 40px rgba(0, 212, 255, 0.6)' },
                        },
                        scan: {
                            '0%': { transform: 'translateY(-100%)' },
                            '100%': { transform: 'translateY(100%)' }
                        }
                    }
                }
            }
        }
    </script>

    <style>
        * {
            scroll-behavior: smooth;
        }

        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        .animate-scan {
            animation: scan 4s linear infinite;
        }

        .animate-pulse-slow {
            animation: pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        body {
            background-color: #0A0E1A;
            color: #ffffff;
            overflow-x: hidden;
        }

        .glass-card {
            background: linear-gradient(135deg, rgba(17, 24, 39, 0.8) 0%, rgba(31, 41, 55, 0.6) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .glass-card-hover {
            transition: all 0.4s ease;
            cursor: pointer;
        }

        .glass-card-hover:hover {
            border-color: rgba(0, 212, 255, 0.5);
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.2);
            transform: translateY(-5px);
        }

        .text-gradient {
            background: linear-gradient(135deg, #00D4FF 0%, #7B2FFF 50%, #00FF88 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .text-gradient-gold {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .bg-gradient-animated {
            background: linear-gradient(-45deg, #0A0E1A, #111827, #1F2937, #0A0E1A);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .line-glow {
            position: relative;
            overflow: hidden;
        }

        .line-glow::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.3), transparent);
            animation: lineGlow 3s infinite;
        }

        @keyframes lineGlow {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .stat-number {
            font-variant-numeric: tabular-nums;
        }

        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #0A0E1A;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #00D4FF, #7B2FFF);
            border-radius: 5px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #00FF88, #00D4FF);
        }

        .nav-glass {
            background: rgba(10, 14, 26, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .hero-glow {
            background: radial-gradient(ellipse at center, rgba(0, 212, 255, 0.15) 0%, transparent 70%);
        }

        .card-gradient {
            background: linear-gradient(145deg, rgba(17, 24, 39, 0.9) 0%, rgba(31, 41, 55, 0.7) 100%);
        }

        .timeline-line::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(180deg, #00D4FF, #7B2FFF, #00FF88);
            transform: translateX(-50%);
        }

        @media (max-width: 768px) {
            .timeline-line::before {
                left: 20px;
            }
        }

        .profile-glow {
            background: radial-gradient(ellipse at 30% 30%, rgba(0, 212, 255, 0.4) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 70%, rgba(123, 47, 255, 0.3) 0%, transparent 60%);
        }

        .skill-bar {
            background: linear-gradient(90deg, #00D4FF, #7B2FFF);
            transition: width 1.5s ease-out;
        }

        .card-3d {
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }

        .card-3d:hover {
            transform: perspective(1000px) rotateY(5deg) rotateX(5deg);
        }

        .floating-badge {
            animation: float 4s ease-in-out infinite;
        }

        .floating-badge-delayed {
            animation: float 4s ease-in-out infinite;
            animation-delay: 2s;
        }

        /* Modal Styles */
        .modal-overlay {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

        // --- Navbar Component ---

            const [scrolled, setScrolled] = useState(false);
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

                { name: 'About', href: '#about' },
                { name: 'Technology', href: '#technology' },
                { name: 'Products', href: '#products' },
                { name: 'Leadership', href: '#leadership' },
                { name: 'Company', href: '#company' },

        // --- Microbial Swarm Canvas Animation ---
        const MicrobialSwarm = () => {
            const canvasRef = useRef(null);

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let animationFrameId;
                let particles = [];

                const resize = () => {
                    if (!canvas || !canvas.parentElement) return;
                    // Fix canvas scaling for high DPI displays
                    const rect = canvas.parentElement.getBoundingClientRect();
                    canvas.width = rect.width * window.devicePixelRatio;
                    canvas.height = rect.height * window.devicePixelRatio;
                    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
                    canvas.style.width = `${rect.width}px`;
                    canvas.style.height = `${rect.height}px`;
                    
                    initParticles(rect.width, rect.height);
                };

                class Particle {
                    constructor(width, height) {
                        this.x = Math.random() * width;
                        this.y = Math.random() * height;
                        this.vx = (Math.random() - 0.5) * 0.4;
                        this.vy = (Math.random() - 0.5) * 0.4;
                        this.radius = Math.random() * 1.5 + 0.5;
                        this.baseAlpha = Math.random() * 0.5 + 0.2;
                    }

                    update(width, height) {
                        this.x += this.vx;
                        this.y += this.vy;

                        if (this.x < 0) this.x = width;
                        if (this.x > width) this.x = 0;
                        if (this.y < 0) this.y = height;
                        if (this.y > height) this.y = 0;
                    }

                    draw(ctx) {
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(0, 212, 255, ${this.baseAlpha})`; // brand-primary cyan
                        ctx.fill();
                    }
                }

                const initParticles = (width, height) => {
                    particles = [];
                    const particleCount = Math.floor((width * height) / 8000); // Responsive density
                    for (let i = 0; i < particleCount; i++) {
                        particles.push(new Particle(width, height));
                    }
                };

                const drawConnections = (width, height) => {
                    for (let i = 0; i < particles.length; i++) {
                        for (let j = i + 1; j < particles.length; j++) {
                            const dx = particles[i].x - particles[j].x;
                            const dy = particles[i].y - particles[j].y;
                            const distance = Math.sqrt(dx * dx + dy * dy);

                            if (distance < 80) {
                                ctx.beginPath();
                                ctx.moveTo(particles[i].x, particles[i].y);
                                ctx.lineTo(particles[j].x, particles[j].y);
                                ctx.strokeStyle = `rgba(0, 212, 255, ${0.15 * (1 - distance / 80)})`;
                                ctx.lineWidth = 0.5;
                                ctx.stroke();
                            }
                        }
                    }
                };

                const render = () => {
                    const rect = canvas.parentElement.getBoundingClientRect();
                    ctx.clearRect(0, 0, rect.width, rect.height);
                    
                    particles.forEach(p => {
                        p.update(rect.width, rect.height);
                        p.draw(ctx);
                    });
                    
                    drawConnections(rect.width, rect.height);
                    
                    animationFrameId = requestAnimationFrame(render);
                };
                
                // Initial setup
                resize();
                window.addEventListener('resize', resize);
                render();

                return () => {
                    window.removeEventListener('resize', resize);
                    cancelAnimationFrame(animationFrameId);
                };
            }, []);

            return <canvas ref={canvasRef} className="absolute inset-0 z-0 pointer-events-none mix-blend-screen opacity-60" />;

                    fullDesc: 'Once isolated in the virtual environment, the selected physical strains undergo a high-fidelity extraction protocol designed to preserve an unprecedented 99.9% viability rate. Following extraction, next-generation genomic sequencing scans the entirety of the microbial DNA. This raw data is fed back into the cloud to create an exact digital twin of the strain, allowing our neural networks to analyze its structure at a molecular level.',

                    hologram: 'pipeline_holo_2_1773742485284.png',
                    stats: [

                        { label: 'Genome Mapping', value: 'Complete Profile' }
                    ]
                },
                { 
                    step: '03', 
                    title: 'Neural Strain Matching',

                        { label: 'Match Precision', value: 'Personalized' }

                    step: '04', 
                    title: 'Automated Quality Control',

                                                        </div>

                                                                    <div className="text-sm font-mono text-gray-200 relative z-10">{stat.value}</div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                </div>
                                            </motion.div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>

                    {/* Feature Modal - Premium Minimalist Split-Screen for Pipeline */}
                    <AnimatePresence>
                        {selectedStep && (
                            <motion.div
                                className="fixed inset-0 z-[100] flex items-center justify-center bg-brand-dark/80 backdrop-blur-xl p-4 sm:p-8"

                                animate={{ opacity: 1 }}
                                exit={{ opacity: 0 }}
                                onClick={() => setSelectedStep(null)}
                            >
                                <motion.div
                                    className="w-full max-w-6xl max-h-[90vh] bg-[#0d121c] border border-white/10 shadow-2xl flex flex-col md:flex-row overflow-hidden isolate relative"

                                    animate={{ scale: 1, opacity: 1 }}
                                    exit={{ scale: 0.98, opacity: 0 }}
                                    transition={{ duration: 0.4, ease: "easeOut" }}
                                    onClick={(e) => e.stopPropagation()}

                                                </div>
                                                <span className="text-[10px] font-bold text-gray-400 uppercase tracking-[0.3em]">

                                                </span>

                                                                <span className="text-gray-300 text-sm tracking-wide font-light flex-1 ml-4 group-hover:text-white transition-colors duration-300">{stat.value}</span>
                                                            </li>
                                                        ))}
                                                    </ul>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="mt-12 pt-8">
                                            <button 
                                                className="text-[10px] font-bold uppercase tracking-[0.2em] text-gray-400 hover:text-white flex items-center transition-colors group"

        const FORMULATIONS = [
            { 
                id: 'daily',
                index: '01',
                name: 'Synflora Daily Balance™', 
                tagline: 'Maintenance Protocol',
                description: 'Our flagship foundational protocol engineered specifically for everyday gut microbiome homeostasis. Formulated with 15 carefully sequenced strains and 50 billion active CFU, Daily Balance is scientifically proven to reinforce immune function, optimize mental wellness via the gut-brain axis, and maximize nutrient absorption efficiency.',
                image: 'clinical_daily.png', 
                cfu: '50 Billion', 
                strains: '15 Active Strains',
                color: 'text-brand-primary',
                borderColor: 'border-brand-primary',
                bgColor: 'bg-brand-primary/10',
                hoverBg: 'hover:bg-brand-primary/5',
                gradient: 'from-[#0a0f18] via-brand-dark to-brand-primary/20',
                metrics: [
                    { label: 'Efficacy Focus', value: 'Microbiome Homeostasis' },
                    { label: 'Target Action', value: 'Gut-Brain Axis Optimization' },
                    { label: 'Clinical Phase', value: 'Active Deployment' }
                ]
            },
            { 
                id: 'repair',
                index: '02',
                name: 'Synflora Gut Repair™', 
                tagline: 'Therapeutic Restoration',

                image: 'clinical_repair.png', 
                cfu: '100 Billion', 
                strains: '25 Active Strains',
                color: 'text-brand-accent',
                borderColor: 'border-brand-accent',
                bgColor: 'bg-brand-accent/10',
                hoverBg: 'hover:bg-brand-accent/5',
                gradient: 'from-[#0a0f18] via-brand-dark to-brand-accent/20',
                metrics: [
                    { label: 'Efficacy Focus', value: 'Epithelial Restoration' },
                    { label: 'Target Action', value: 'Inflammation Suppression' },
                    { label: 'Clinical Phase', value: 'Targeted Therapy' }
                ]
            },
            { 
                id: 'immune',
                index: '03',
                name: 'Synflora Immune Defense™', 
                tagline: 'Pathogen Resistance',
                description: 'A dedicated bio-shielding complex formulated essentially as an immune system multiplier. Containing 75 billion CFU and 20 targeted sentinel strains, this robust formula provides advanced systemic antioxidant protection, aggressive active pathogen defense, and critical seasonal support against external biological stressors.',
                image: 'clinical_immune.png', 
                cfu: '75 Billion', 
                strains: '20 Sentinel Strains',
                color: 'text-brand-secondary',
                borderColor: 'border-brand-secondary',
                bgColor: 'bg-brand-secondary/10',
                hoverBg: 'hover:bg-brand-secondary/5',
                gradient: 'from-[#0a0f18] via-brand-dark to-brand-secondary/20',
                metrics: [
                    { label: 'Efficacy Focus', value: 'Systemic Immunity' },
                    { label: 'Target Action', value: 'Active Pathogen Defense' },
                    { label: 'Clinical Phase', value: 'Preventative Shielding' }
                ]
            }
        ];

        const Products = () => {
            const containerRef = useRef(null);
            const [activeFormulation, setActiveFormulation] = useState(FORMULATIONS[0]);

                                                    <span className={`font-mono text-xs ${isActive ? item.color : 'text-gray-600 group-hover:text-gray-400'} transition-colors duration-300`}>[{item.index}]</span>

                                                        <motion.div layoutId="activeDot" className={`w-2 h-2 rounded-full ${item.bgColor} border ${item.borderColor}`}></motion.div>
                                                    ) : (
                                                        <div className="w-1.5 h-1.5 rounded-full bg-white/5 group-hover:bg-white/20 transition-colors"></div>
                                                    )}
                                                </div>
                                                
                                                <h3 className={`font-display text-xl md:text-2xl mb-2 transition-colors duration-300 ${isActive ? 'text-white' : 'text-gray-400 group-hover:text-white'}`}>

                                                </h3>
                                                
                                                <p className={`text-xs uppercase tracking-[0.15em] transition-colors duration-300 ${isActive ? item.color : 'text-gray-600 group-hover:text-gray-500'}`}>

                                                </div>
                                            </motion.button>
                                        );
                                    })}
                                </div>
                            </div>

                                        key={activeFormulation.id}
                                        initial={{ opacity: 0, scale: 1.2, filter: 'blur(10px)' }}
                                        animate={{ 
                                            opacity: 1, 
                                            scale: [1.2, 1, 1.1],
                                            y: [0, -20, 0],
                                            filter: 'blur(0px)'
                                        }}
                                        exit={{ opacity: 0, scale: 0.9, filter: 'blur(10px)' }}
                                        transition={{ 
                                            opacity: { duration: 0.6 },
                                            filter: { duration: 1 },
                                            scale: { duration: 8, repeat: Infinity, repeatType: "reverse", ease: "linear" },
                                            y: { duration: 4, repeat: Infinity, repeatType: "reverse", ease: "easeInOut" }

                                        className="absolute inset-0 z-0 bg-black"

                                            alt={activeFormulation.name} 
                                            className="w-full h-full object-cover opacity-100"

                                        <div className={`absolute inset-0 bg-gradient-to-t ${activeFormulation.gradient} opacity-80 mix-blend-multiply`}></div>

                                        <motion.div

            const numValue = parseFloat(value.toString().replace(/[^0-9.]/g, ''));

                    const totalFrames = duration * 60;

                        frame++;
                        const progress = frame / totalFrames;
                        const easeOut = 1 - Math.pow(1 - progress, 3);
                        setCount(0 + numValue * easeOut);
                        if (frame === totalFrames) {
                            clearInterval(timer);
                            setCount(numValue);
                        }
                    }, 1000 / 60);
                    return () => clearInterval(timer);

        // --- Particle Animation Component ---
        const ParticleBackground = () => {
            const canvasRef = useRef(null);

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let animationFrameId;
                
                let particles = [];
                // More particles for a better microbial community effect
                const particleCount = Math.min(window.innerWidth / 15, 120); 
                
                let mouse = { x: null, y: null, radius: 150 };

                const resize = () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                };

                window.addEventListener('resize', resize);
                resize();

                const handleMouseMove = (event) => {
                    mouse.x = event.clientX;
                    mouse.y = event.clientY;
                };
                window.addEventListener('mousemove', handleMouseMove);

                const handleMouseOut = () => {
                    mouse.x = null;
                    mouse.y = null;
                };
                window.addEventListener('mouseout', handleMouseOut);

                // Colors for microbial/AI node theme
                const colors = ['#00D4FF', '#7B2FFF', '#00FF88'];

                class Particle {
                    constructor() {
                        this.x = Math.random() * canvas.width;
                        this.y = Math.random() * canvas.height;
                        this.size = Math.random() * 2.5 + 1;
                        this.baseX = this.x;
                        this.baseY = this.y;
                        this.density = (Math.random() * 30) + 1;
                        this.vx = (Math.random() - 0.5) * 1;
                        this.vy = (Math.random() - 0.5) * 1;
                        this.color = colors[Math.floor(Math.random() * colors.length)];
                    }
                    
                    draw() {
                        ctx.fillStyle = this.color;
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                        ctx.closePath();
                        ctx.fill();
                        
                        // Add glow effect
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = this.color;
                    }
                    
                    update() {
                        // Reset shadow for performance
                        ctx.shadowBlur = 0;
                        
                        // Slowly move
                        this.x += this.vx;
                        this.y += this.vy;

                        // Bounce off edges
                        if (this.x < 0 || this.x > canvas.width) this.vx = -this.vx;
                        if (this.y < 0 || this.y > canvas.height) this.vy = -this.vy;

                        // Mouse interaction
                        if (mouse.x != null && mouse.y != null) {
                            let dx = mouse.x - this.x;
                            let dy = mouse.y - this.y;
                            let distance = Math.sqrt(dx * dx + dy * dy);
                            
                            if (distance < mouse.radius) {
                                let forceDirectionX = dx / distance;
                                let forceDirectionY = dy / distance;
                                let maxDistance = mouse.radius;
                                let force = (maxDistance - distance) / maxDistance;
                                let directionX = forceDirectionX * force * this.density;
                                let directionY = forceDirectionY * force * this.density;
                                
                                this.x -= directionX;
                                this.y -= directionY;
                            }
                        }
                    }
                }

                const init = () => {
                    particles = [];
                    for (let i = 0; i < particleCount; i++) {
                        particles.push(new Particle());
                    }
                };
                init();

                const connect = () => {
                    let maxDistance = (canvas.width / 12) * (canvas.height / 12);
                    for (let a = 0; a < particles.length; a++) {
                        for (let b = a; b < particles.length; b++) {
                            let dx = particles[a].x - particles[b].x;
                            let dy = particles[a].y - particles[b].y;
                            let distance = dx * dx + dy * dy;
                            
                            if (distance < maxDistance) {
                                let opacity = 1 - (distance / maxDistance);
                                // DNA/Data string connection style
                                ctx.strokeStyle = `rgba(0, 212, 255, ${opacity * 0.4})`;
                                ctx.lineWidth = 1;
                                ctx.beginPath();
                                ctx.moveTo(particles[a].x, particles[a].y);
                                ctx.lineTo(particles[b].x, particles[b].y);
                                ctx.stroke();
                            }
                        }
                    }
                };

                const animate = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    for (let i = 0; i < particles.length; i++) {
                        particles[i].draw();
                        particles[i].update();
                    }
                    connect();
                    animationFrameId = requestAnimationFrame(animate);
                };
                animate();

                return () => {
                    window.removeEventListener('resize', resize);
                    window.removeEventListener('mousemove', handleMouseMove);
                    window.removeEventListener('mouseout', handleMouseOut);
                    cancelAnimationFrame(animationFrameId);
                };
            }, []);

            return (
                <canvas 
                    ref={canvasRef} 
                    className="fixed inset-0 pointer-events-none"
                    style={{ zIndex: -10, background: 'transparent' }}
                />
            );
        };

        // --- Main App ---
        const App = () => {
            return (
                <div className="antialiased selection:bg-brand-primary selection:text-brand-dark">
                    <div className="fixed inset-0 bg-gradient-animated" style={{ zIndex: -20 }}></div>
                    <ParticleBackground />
                    <div className="relative z-10">
                        <Navbar />
                        <Hero />
                        <About />
                        <Technology />
                        <Products />
                        <GlobalInfrastructure />
                        <ClinicalStandards />
                        <SynfloraAdvantage />
                        <Leadership />
                        <Company />
                        <Contact />
                        <Footer />
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
